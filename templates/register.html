<!DOCTYPE html>
<html>
<head>
<title>Register Donor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container mt-5">

<div class="card p-4 shadow">

<h3 class="text-center text-danger">Register Donor</h3>

<form action = "/add_donor" method="POST">

<input class="form-control mb-2" name="name" placeholder="Name" required>
<input class="form-control mb-2" name="age" placeholder="Age">

<select class="form-select mb-2" name="gender">
<option>Male</option>
<option>Female</option>
</select>

<select class="form-control mb-2" name="blood_group" placeholder="Blood Group">
<option>A+</option><option>A-</option>
<option>B+</option><option>B-</option>
<option>AB+</option><option>AB-</option>
<option>O+</option><option>O-</option>
</select>

<input class="form-control mb-2" name="phone" placeholder="Phone">
<input class="form-control mb-2" name="address" placeholder="City">
<input class="form-control mb-3" type="date" name="last_donation">

<button class="btn btn-danger w-100">Register</button>

</form>

</div>

</div>

</body>
</html>
