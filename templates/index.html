<!DOCTYPE html>
<html>
<head>
    <title>BloodConnect</title>
    <meta charset="UTF-8">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container">
        <span class="navbar-brand text-danger fw-bold fs-4">🩸 BloodConnect</span>
        <a href="/login" class="btn btn-outline-danger btn-sm">Admin</a>
    </div>
</nav>

<!-- Main Section -->
<div class="container text-center mt-5">

    <h2 class="fw-bold">Need Blood Urgently?</h2>
    <p class="text-muted">Send a request and get help instantly</p>

    <!-- Request Form -->
    <div class="card p-4 shadow mx-auto" style="max-width:420px; border-radius:15px;">

        <form action="/request_blood" method="POST">

            <!-- Blood Group -->
            <select name="blood" class="form-select mb-3" required>
                <option value="">Select Blood Group</option>
                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>B-</option>
                <option>AB+</option>
                <option>AB-</option>
                <option>O+</option>
                <option>O-</option>
            </select>

            <!-- City -->
            <input type="text" name="city" class="form-control mb-3" placeholder="Enter City" required>

            <!-- Name -->
            <input type="text" name="name" class="form-control mb-3" placeholder="Your Name" required>

            <!-- Units -->
            <input type="number" name="units" class="form-control mb-3" placeholder="Units Required" required>

            <!-- Submit -->
            <button type="submit" class="btn btn-danger w-100">
                Send Request
            </button>

        </form>

    </div>

    <!-- Register -->
    <div class="mt-4">
        <a href="/register" class="btn btn-success px-4">Become a Donor</a>
    </div>

</div>

<!-- Footer -->
<footer class="text-center mt-5 text-muted">
    <p>© 2026 BloodConnect | Save Lives ❤️</p>
</footer>

</body>
</html>
